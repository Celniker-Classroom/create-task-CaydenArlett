<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id = "container">
        <!-- I am making a hangman game that will have a start button which enables all buttons generates a random word 
        from different word banks based on the difficulty selected and then the user can guess letters or words 
        using the guess button. The guess button will call a method that will check if the word contains
        the guesed letter or if they guess a word it will check if the word is correct. The user will have 
        6 lives and each wrong guess will take away a life. The game will also keep track of wins, losses, 
        average guesses, and guess accuracy. -->
        <h1>Hangman</h1>

        <div id="startGame">
            <input type = radio name="difficulty" id="easy" value="easy" checked>
            <label for="easy">Easy</label>
            <input type = radio name="difficulty" id="medium" value="medium">
            <label for="medium">Medium</label>
            <input type = radio name="difficulty" id="hard" value="hard">
            <label for="hard">Hard</label>
            <button id="startBtn">Start Game</button>
        </div>

        <div id="guess">
            <input type="text" id="guessInput" placeholder="Enter your guess">
            <button id="guessBtn" disabled>Guess Word</button>
        </div>
        <img id="hangmanImage" src="image/hangman0.svg" alt="Hangman">
        
        <p id="lives">Lives: 6</p>
        
        <p id="wordDisplay">_ _ _ _ _</p>

        <p id="failedGuesses">Failed Guesses: </p>
        
        <p id="message"></p>

        <div id="stats">
            <h2>Stats</h2>
            <p id ="wins">Wins: 0</p>
            <p id="losses">Losses: 0</p>
            <p id="averageGuesses">Average Guesses Per Win: 0</p>
            <p id= "guessAcuracy">Guess Accuracy: 0%</p>
        </div>

    </div>
</body>
</html>
